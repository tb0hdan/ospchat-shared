name: CI

# Push/PR verification: ktlint + multiplatform build + desktop tests on a
# single Linux runner. Tag pushes additionally publish artifacts — see
# release.yml.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ktlint + build + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Gradle 8.10.2
        run: |
          set -euo pipefail
          curl -sSLo /tmp/gradle.zip \
            https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.10.2/bin" >> "$GITHUB_PATH"
          /opt/gradle-8.10.2/bin/gradle --version

      - name: Install ktlint 1.8.0
        run: |
          set -euo pipefail
          curl -sSLo /tmp/ktlint \
            https://github.com/pinterest/ktlint/releases/download/1.8.0/ktlint
          chmod +x /tmp/ktlint
          sudo mv /tmp/ktlint /usr/local/bin/ktlint
          ktlint --version

      - name: Cache Gradle home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up Android SDK
        # Required by the androidTarget compilation.
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: ktlint
        run: make ktlint

      - name: Build (compile + tests)
        env:
          GRADLE: gradle
        run: make build
