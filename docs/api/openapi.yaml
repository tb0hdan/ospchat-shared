openapi: 3.0.3
info:
  title: OSPChat Peer API
  version: 0.14.0
  description: |
    REST API exposed by every OSPChat peer on the local network. Each running
    instance binds an embedded Ktor server to an ephemeral TCP port; that port
    is advertised over mDNS / DNS-SD (`_ospchat._tcp.`) together with the
    peer's stable UUID (TXT attribute `uuid`) and its base64-encoded Ed25519
    public key (TXT attribute `pk`).

    All endpoints are grouped under `/v1`.

    ## Trust model

    Phase 2 multi-network bridging introduces per-install Ed25519 keypairs and
    signed message DTOs:

      - The advertised `pk` (also returned by `GET /v1/info` as `publicKey`)
        is TOFU-pinned by the receiver on first sight. Subsequent mDNS
        resolutions of the same UUID with a different `pk` are rejected, so
        an attacker can't displace a previously-pinned identity. Persistent
        pinning carries the protection across process restarts.
      - Every body-bearing peer-trusted POST (`/v1/messages`,
        `/v1/read-receipts`, `/v1/reactions`, all `/v1/groups/*` except
        `/v1/groups/messages` whose inner pieces are signed individually)
        carries a base64 Ed25519 `signature` over a canonical payload plus
        a `signedAt` epoch-millisecond timestamp. Receivers verify against
        the sender's pinned pubkey and reject signedAt outside a ±5 minute
        replay window.
      - Source-IP equality (origin matches any candidate of the named
        sender's discovered peer entry) remains in place as a cheap
        first-pass filter.

    During the phase 2b rollout window receivers tolerate unsigned bodies
    with a WARN log — clients running pre-2b builds still inter-operate.
    A future API version will flip to strict-require.

    Phase 3 multi-network bridging extends signatures to the call signaling
    DTOs (`/v1/call/{offer,answer,ice,hangup}`) and adds the new
    `POST /v1/call/relay-cred` endpoint that issues short-lived TURN
    credentials (RFC 5766 long-term credentials in TURN-REST-API format,
    5-minute TTL). The TURN server itself is a pure-Kotlin RFC 5766 subset
    embedded in every peer process; the existing phase-4 `relayEnabled`
    flag gates both message-DTO forwarding and voice TURN relay (one
    toggle, two purposes).

    Phase 5 (PR 3) extends the phase-4 `toUuid` / `via` / `hopTtl`
    bridging fields onto the four call DTOs, so the SDP signaling itself
    can hop through a relay-enabled bridge when the two peers can't reach
    each other directly. TURN handles the media plane; phase-4-style
    relay handles the signaling plane. Both layers required for a true
    cross-network voice call.

    Binary fetches (`/v1/attachments`, `/v1/avatar`, `/v1/notify-refresh`)
    remain unsigned for now.

    ## Cross-LAN relay (phase 4)

    Multi-homed peers (e.g. a desktop on two LANs that aren't routed
    between each other) can relay signed DTOs between unrelated sides:

      - Every signed DTO gains `toUuid` (final recipient), `via` (hop
        list, intermediates append themselves), and `hopTtl`
        (decremented per hop, starts at 3 by default). `toUuid` is
        included in the signature payload via an append-only extension
        — phase-2b clients with `toUuid == null` sign byte-identical
        bytes to a phase-4 client with `toUuid == null`, so signatures
        remain wire-compatible. `via` and `hopTtl` are *not* signed
        because intermediates mutate them.
      - `GET /v1/info` now also returns `peers: [GossipedPeer]` (the
        responder's currently-discovered peers, minus the requester
        themselves and any peer without a known pubkey) plus
        `relayEnabled: bool`. The requester learns about
        otherwise-unreachable peers and which bridges are willing to
        forward.
      - When a route receives a signed DTO with `toUuid != self`, it
        either forwards (relay opt-in, target in discovery, TTL > 0,
        no loop in `via`) or rejects with `relay_refused` /
        `relay_unroutable`. Receivers verify the *original sender's*
        signature, not the intermediate's, so relays cannot tamper.
      - Source-IP equality is skipped for signed requests — relay
        sources legitimately differ from the named `fromUuid`. Identity
        is asserted by the signature, not the IP.

    There is no TLS. This API is intended for trusted LAN environments
    (or LAN-equivalent overlays like Tailscale).
servers:
  - url: http://{host}:{port}
    description: A single peer reachable on the local network.
    variables:
      host:
        default: 192.0.2.10
        description: The peer's IP on the local network, as resolved via NSD.
      port:
        default: "9000"
        description: |
          The ephemeral port advertised by the peer via NSD. The default of
          9000 is illustrative only; the real value is chosen at runtime by
          the operating system and announced through the `_ospchat._tcp.`
          DNS-SD record.
tags:
  - name: identity
    description: Endpoints for handshake / probing.
  - name: messages
    description: Endpoints for exchanging chat messages.
  - name: groups
    description: Endpoints for group chats and broadcast channels.
  - name: calls
    description: |
      Signaling endpoints for one-to-one audio calls. Media itself rides
      libwebrtc over UDP once ICE has connected; only SDP and ICE flow
      through these HTTP routes. Phase 1 is audio-only; video is out of
      scope until a later API version.
paths:
  /v1/info:
    get:
      tags: [identity]
      summary: Return the peer's identity.
      description: |
        Used as a lightweight handshake or liveness probe. Always returns 200
        with the peer's own UUID, current nickname, and the API version it
        speaks.
      operationId: getInfo
      responses:
        "200":
          description: The peer's identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Info"
              examples:
                example:
                  value:
                    uuid: 7c3e8b1d-4c2f-4ed5-a3b1-5b9f1ed0a51d
                    nickname: alice
                    apiVersion: v1
  /v1/reactions:
    post:
      tags: [messages]
      summary: Add, replace, or remove a reaction on a message.
      description: |
        Each user can have at most **one** reaction per message: a fresh
        `ReactionDto` from the same `fromUuid` on the same `messageId`
        replaces the previous one.

        When `emoji` is `null`, the receiver should delete the row for
        `(messageId, fromUuid)` entirely — this is how a user clears
        their reaction.

        Authenticated by `fromUuid` against the live NSD snapshot, with
        the request's source IP matching that peer's advertised host
        (identical to `POST /v1/messages`).

        When `groupId` is set the receiver additionally validates that
        `fromUuid` is in the current member list of `groupId`; a sender
        who is not a member is rejected with 404. `groupId` is omitted
        for DM reactions.
      operationId: postReaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Reaction"
            examples:
              add:
                summary: Adding 😀 to a message
                value:
                  messageId: 0d8b8c0c-5d3f-4a3b-b1a4-3a7c6b9f3a02
                  fromUuid: 7c3e8b1d-4c2f-4ed5-a3b1-5b9f1ed0a51d
                  fromNickname: alice
                  emoji: 😀
                  reactedAt: 1742140800000
              remove:
                summary: Removing a previously-placed reaction
                value:
                  messageId: 0d8b8c0c-5d3f-4a3b-b1a4-3a7c6b9f3a02
                  fromUuid: 7c3e8b1d-4c2f-4ed5-a3b1-5b9f1ed0a51d
                  fromNickname: alice
                  emoji: null
                  reactedAt: 1742140905000
      responses:
        "202":
          description: Reaction accepted.
          content: {}
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/notify-refresh:
    post:
      tags: [identity]
      summary: Tell this peer that the sender's `/v1/info` has changed.
      description: |
        Empty-body POST. The receiver should re-pull `/v1/info` from the
        requesting peer (identified by source IP against the live NSD
        snapshot) to pick up nickname / avatar changes. Used by the
        sender immediately after they update their avatar so peers don't
        have to wait for an NSD-level lost+found cycle.

        Authenticated by source IP only — no body needed. The handler
        kicks off the sync on a background coroutine and returns 202 to
        keep the round-trip short.
      operationId: postNotifyRefresh
      responses:
        "202":
          description: Refresh accepted; the receiver will pull /v1/info shortly.
          content: {}
        "401":
          $ref: "#/components/responses/Error"
  /v1/avatar:
    get:
      tags: [identity]
      summary: Stream this peer's custom avatar (JPEG bytes).
      description: |
        Returns the raw JPEG bytes for the peer's user-set avatar. The
        `avatarHash` field of `GET /v1/info` carries the SHA-256 hex of the
        same bytes, so receivers fetch this endpoint only when their cached
        hash differs.

        Responds 404 when the peer has no custom avatar set (the requester
        should render nickname initials instead).

        Authenticated by source IP against the live NSD snapshot, identical
        to `GET /v1/attachments/{messageId}`.
      operationId: getAvatar
      responses:
        "200":
          description: The avatar JPEG bytes.
          content:
            "image/jpeg":
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/peer-avatar/{uuid}:
    get:
      tags: [identity]
      summary: Stream a bridge's locally-cached copy of a phantom peer's avatar (JPEG bytes).
      description: |
        Phase 4 multi-network bridging — when peer A and peer C sit on
        unrouted LANs but both reach a bridge B that's multi-homed, A
        learns about C via B's `/v1/info.peers` gossip but can't reach
        C directly. This endpoint on B serves the avatar bytes B has
        cached for C (from B's own direct sync against C). Receivers
        notice an avatar update via the `avatarHash` field on the
        corresponding `GossipedPeer` entry and pull the bytes from one
        of the bridges that vouched for the target.

        Responds 404 when B has no cached avatar for {uuid} (B hasn't
        synced from {uuid} yet, or {uuid} has no custom avatar set).

        Authenticated by source IP against the live NSD snapshot, like
        `/v1/avatar` and `/v1/attachments/{messageId}`.
      operationId: getPeerAvatar
      parameters:
        - in: path
          name: uuid
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the gossiped peer whose cached avatar to retrieve.
      responses:
        "200":
          description: The cached avatar JPEG bytes.
          content:
            "image/jpeg":
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/messages:
    post:
      tags: [messages]
      summary: Deliver a single chat message to this peer.
      description: |
        Called by another peer when they want to send a message to this one.
        Bodies are JSON encoded and conform to `IncomingMessage`. The receiver
        is responsible for de-duplication keyed by `id`.
      operationId: postMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncomingMessage"
            examples:
              example:
                value:
                  id: 0d8b8c0c-5d3f-4a3b-b1a4-3a7c6b9f3a02
                  fromUuid: 7c3e8b1d-4c2f-4ed5-a3b1-5b9f1ed0a51d
                  fromNickname: alice
                  body: hello, world
                  sentAt: 1742140800000
      responses:
        "202":
          description: Message accepted for delivery. The response body is empty.
          content: {}
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/read-receipts:
    post:
      tags: [messages]
      summary: Mark earlier messages from a peer as read.
      description: |
        Sent by a peer (the reader) after they have viewed messages from the
        recipient of this request (the original sender). The recipient should
        upgrade their outbound rows to that peer with
        `sent_at <= upToSentAt` from DELIVERED to READ. The operation is
        idempotent — replays are safe and have no effect.

        The same trust check applies as for `/v1/messages`: `fromUuid` must
        match a peer the receiver has discovered via NSD, and the source IP
        must match that peer's advertised host.
      operationId: postReadReceipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReadReceipt"
            examples:
              example:
                value:
                  fromUuid: 7c3e8b1d-4c2f-4ed5-a3b1-5b9f1ed0a51d
                  upToSentAt: 1742140800000
      responses:
        "202":
          description: Receipt accepted; matching messages have been marked read.
          content: {}
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/attachments/{messageId}:
    get:
      tags: [messages]
      summary: Stream the binary content of a message's attachment.
      description: |
        Returns the raw bytes for the attachment previously announced by the
        sender (the server hosting this endpoint) in `POST /v1/messages`
        for `messageId`. The Content-Type header carries the original MIME
        type (e.g. `image/jpeg`).

        The requesting peer is authenticated by source IP: it must match a
        host advertised by some currently-known peer in the NSD snapshot.
      operationId: getAttachment
      parameters:
        - in: path
          name: messageId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The attachment binary stream.
          content:
            "image/jpeg":
              schema:
                type: string
                format: binary
            "application/octet-stream":
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/groups/messages:
    post:
      tags: [groups]
      summary: Post a message to a group.
      description: |
        Mesh-delivered group message. The poster sends this directly to
        every other current member (excluding themselves). Each request
        carries a fresh `GroupSnapshot` so the receiver auto-creates the
        group on first contact and adopts membership updates when the
        sender is the creator AND the snapshot is newer.

        For `BROADCAST` groups, the receiver rejects messages where
        `fromUuid != creatorUuid`.

        Authenticated by `message.fromUuid` against the live NSD snapshot.
      operationId: postGroupMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupMessagePost"
      responses:
        "202":
          description: Accepted.
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/groups/membership:
    post:
      tags: [groups]
      summary: Push a membership snapshot.
      description: |
        Creator-only operation. Sent by the creator after every add/remove
        to push the new snapshot to current members. Receivers ignore the
        snapshot unless the sender is the group's creator AND
        `membershipUpdatedAt` is strictly newer than the local copy.
      operationId: postGroupMembership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupSnapshot"
      responses:
        "202":
          description: Accepted.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/groups/sync:
    post:
      tags: [groups]
      summary: Catch up on missed group messages.
      description: |
        Bidirectional history sync triggered on every NSD "absent →
        present" peer transition. The caller sends a list of
        `(groupId, latestSentAt)` cursors; the responder returns, per
        group, its current snapshot plus any messages newer than the
        cursor.

        The responder only includes a group when BOTH the caller and
        itself are current members. Authenticated by `fromUuid` against
        the NSD snapshot.
      operationId: postGroupSync
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupSyncRequest"
      responses:
        "200":
          description: Catch-up payload for each shared group.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupSyncResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/call/offer:
    post:
      tags: [calls]
      summary: Invite the peer to a new audio call.
      description: |
        Sent by the caller to initiate a call. The body carries the
        sender-generated `callId` (UUID — both sides reference it for every
        subsequent message) and the SDP offer.

        Receivers auto-reject with `POST /v1/call/hangup` (`reason: BUSY`)
        when another call is already active — the row is not persisted in
        that case. Otherwise they store the call as `RINGING` / `INCOMING`,
        stash the offer SDP in memory until the user accepts or declines,
        and ring the user via the platform's notification surface.

        Authenticated by `fromUuid` against the live NSD snapshot, identical
        to `POST /v1/messages`.
      operationId: postCallOffer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallOffer"
      responses:
        "202":
          description: Offer accepted; the receiver will either accept or hang up.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/call/answer:
    post:
      tags: [calls]
      summary: Accept an incoming call.
      description: |
        Sent by the callee after the user clicks "Accept". Carries the SDP
        answer to install on the caller's open `RTCPeerConnection`. After
        this message ICE candidates may flow in both directions via
        `/v1/call/ice`; once ICE connects, media is flowing and the call
        transitions to `CONNECTED` on both sides.
      operationId: postCallAnswer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallAnswer"
      responses:
        "202":
          description: Answer accepted.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/call/ice:
    post:
      tags: [calls]
      summary: Trickle one ICE candidate.
      description: |
        Sent zero or more times by either side during ICE gathering. Phase 1
        restricts gathering to host candidates only (LAN-only OSPChat
        deployments — no STUN, no TURN). Receivers add each candidate to
        the live `RTCPeerConnection`; missing candidates are tolerated
        because ICE will pick whichever pair connects first.
      operationId: postCallIce
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallIce"
      responses:
        "202":
          description: ICE candidate accepted.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/call/hangup:
    post:
      tags: [calls]
      summary: End an active or pending call.
      description: |
        Sent by either side, at any phase. Covers all four termination
        cases — rejecting an incoming offer (while still `RINGING`),
        cancelling an outgoing offer (before answer), ending a connected
        call, and auto-rejecting because the local side was already on
        another call (`reason: BUSY`).

        The receiver closes its `RTCPeerConnection` if open and marks the
        row `ENDED` with the wire-supplied `reason` (or `HANGUP` if
        absent). Always best-effort: the sender does not retry on failure;
        if the peer is unreachable they'll figure it out from their own
        ICE timeout.
      operationId: postCallHangup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallHangup"
      responses:
        "202":
          description: Hangup accepted.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/call/relay-cred:
    post:
      tags: [calls]
      summary: Request short-lived TURN credentials from a relay-enabled bridge.
      description: |
        Phase 3 multi-network bridging. Requesters POST this to a bridge —
        any peer in the requester's discovery snapshot whose `/v1/info`
        advertised `relayEnabled: true` — to obtain a TURN username /
        credential pair that lets libwebrtc gather `relay`-class ICE
        candidates. The credential expires 5 minutes after issue (matches
        the signature replay window so a leaked response can't outlive
        its own signature).

        The response is signed by the bridge so the requester can verify
        the credentials weren't forged in transit by a LAN MitM. During
        the phase-3 rollout window the response signature is tolerated-
        absent for the same reason as other signed DTOs.

        Bridges that haven't started a TURN server (`relayEnabled=false`
        at boot, or no bound interfaces) respond `503 relay_unavailable`.
        Pre-phase-3 peers respond `404` — callers treat this as
        "no relay available" and fall back to direct ICE.
      operationId: postCallRelayCred
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelayCredRequest"
      responses:
        "200":
          description: TURN credentials issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelayCredResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          description: Bridge has relayEnabled=false (`relay_denied`).
          $ref: "#/components/responses/Error"
        "503":
          description: TURN server not running (`relay_unavailable`).
          $ref: "#/components/responses/Error"
  /v1/groups/leave:
    post:
      tags: [groups]
      summary: Notify members that the sender has left a group.
      description: |
        Self-removal. The leaver pushes this to every current member they
        know about; receivers remove the leaver from their local member
        list. Creator-leave is rejected (creator-leave is not supported
        in v1).
      operationId: postGroupLeave
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupLeave"
      responses:
        "202":
          description: Accepted.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
components:
  schemas:
    Info:
      type: object
      required: [uuid, nickname, apiVersion]
      properties:
        uuid:
          type: string
          format: uuid
          description: Stable per-install identifier of this peer.
        nickname:
          type: string
          minLength: 1
          maxLength: 32
          description: Display name chosen by the peer's user.
        apiVersion:
          type: string
          enum: [v1]
          description: API version this peer implements.
        avatarHash:
          type: string
          nullable: true
          pattern: "^[0-9a-f]{64}$"
          description: |
            SHA-256 hex of the peer's custom avatar JPEG, or `null` when no
            custom avatar is set. Receivers re-fetch `GET /v1/avatar` when
            this value changes from what they have cached.
        publicKey:
          type: string
          nullable: true
          description: |
            Phase 2a multi-network bridging — base64-encoded raw Ed25519
            public key (32 bytes → 44 b64 chars), same as the `pk` mDNS
            TXT attribute. Receivers cross-check this against the TXT
            pubkey when both are present; mismatch logs a warning but
            doesn't reject. `null` for peers running a pre-phase-2a build.
        peers:
          type: array
          nullable: true
          maxItems: 64
          description: |
            Phase 4 multi-network bridging — peers this responder
            currently sees via discovery, minus the requester themselves
            and any peer without a known pubkey. The requester learns
            about peers reachable through this responder as a bridge.
            Empty `[]` for peers with nothing to gossip; `null` for
            pre-phase-4 builds that don't know about the field.
          items:
            $ref: "#/components/schemas/GossipedPeer"
        relayEnabled:
          type: boolean
          nullable: true
          description: |
            Phase 4 multi-network bridging — `true` when this peer will
            forward signed DTOs whose `toUuid` is set to another peer
            it knows. `false` (default) or `null` means relay requests
            are refused with `relay_refused`.
    IncomingMessage:
      type: object
      required: [id, fromUuid, fromNickname, body, sentAt]
      properties:
        id:
          type: string
          format: uuid
          description: Sender-generated unique identifier; used for dedup.
        fromUuid:
          type: string
          format: uuid
          description: The sender's stable UUID.
        fromNickname:
          type: string
          minLength: 1
          maxLength: 32
          description: The sender's display name at the time of sending.
        body:
          type: string
          minLength: 1
          maxLength: 4096
          description: Plain text message body. UTF-8.
        sentAt:
          type: integer
          format: int64
          minimum: 0
          description: Unix epoch milliseconds when the message was authored.
        attachment:
          allOf:
            - $ref: "#/components/schemas/Attachment"
          nullable: true
          description: |
            Optional image attachment. If present, the receiver should fetch
            the binary via `GET /v1/attachments/{id}` on the sender.
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
        toUuid:
          $ref: "#/components/schemas/ToUuid"
        via:
          $ref: "#/components/schemas/Via"
        hopTtl:
          $ref: "#/components/schemas/HopTtl"
    Attachment:
      type: object
      required: [mimeType, sizeBytes, width, height]
      properties:
        mimeType:
          type: string
          example: image/jpeg
          description: MIME type of the attachment binary.
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
          description: Encoded size in bytes.
        width:
          type: integer
          minimum: 0
          description: Image width in pixels (used to size placeholders).
        height:
          type: integer
          minimum: 0
          description: Image height in pixels (used to size placeholders).
    Reaction:
      type: object
      required: [messageId, fromUuid, fromNickname, reactedAt]
      properties:
        messageId:
          type: string
          format: uuid
          description: The message this reaction is attached to.
        fromUuid:
          type: string
          format: uuid
          description: UUID of the peer placing (or removing) the reaction.
        fromNickname:
          type: string
          minLength: 1
          maxLength: 32
          description: Sender's display name at the time of reacting.
        emoji:
          type: string
          nullable: true
          minLength: 1
          maxLength: 16
          description: |
            The emoji glyph. `null` means *remove* the sender's current
            reaction on the message, regardless of which emoji it was.
        reactedAt:
          type: integer
          format: int64
          minimum: 0
          description: Unix epoch milliseconds when the reaction was placed.
        groupId:
          type: string
          format: uuid
          nullable: true
          description: |
            Non-null when the reaction is on a group message — the receiver
            then validates `fromUuid` against group membership. Omit for DM
            reactions.
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
        toUuid:
          $ref: "#/components/schemas/ToUuid"
        via:
          $ref: "#/components/schemas/Via"
        hopTtl:
          $ref: "#/components/schemas/HopTtl"
    ReadReceipt:
      type: object
      required: [fromUuid, upToSentAt]
      properties:
        fromUuid:
          type: string
          format: uuid
          description: The reader's stable UUID — i.e. who has read the messages.
        upToSentAt:
          type: integer
          format: int64
          minimum: 0
          description: |
            Unix epoch milliseconds. Only the recipient's `DELIVERED`
            outbound rows with `sentAt <= upToSentAt` are upgraded to
            `READ`. Rows still in `SENDING` (in-flight) or `FAILED`
            (terminal error) are left alone — the reader will need to
            send a fresh receipt once the message settles.
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
        toUuid:
          $ref: "#/components/schemas/ToUuid"
        via:
          $ref: "#/components/schemas/Via"
        hopTtl:
          $ref: "#/components/schemas/HopTtl"
    GroupKind:
      type: string
      enum: [CHAT, BROADCAST]
      description: |
        `CHAT` — any member may post. `BROADCAST` — only the creator may
        post; receivers reject inbound messages from non-creators.
    GroupMember:
      type: object
      required: [uuid, nickname]
      properties:
        uuid:
          type: string
          format: uuid
        nickname:
          type: string
    GroupSnapshot:
      type: object
      required: [id, name, kind, creatorUuid, createdAt, membershipUpdatedAt, members]
      description: |
        Authoritative description of a group at a point in time. Carried on
        every group-related request so receivers can auto-create or upgrade
        their local copy. Receivers only accept membership changes when the
        snapshot is sent by the [creatorUuid] AND its [membershipUpdatedAt]
        is strictly newer than the local copy.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        kind:
          $ref: "#/components/schemas/GroupKind"
        creatorUuid:
          type: string
          format: uuid
        createdAt:
          type: integer
          format: int64
        membershipUpdatedAt:
          type: integer
          format: int64
        members:
          type: array
          items:
            $ref: "#/components/schemas/GroupMember"
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
        toUuid:
          $ref: "#/components/schemas/ToUuid"
        via:
          $ref: "#/components/schemas/Via"
        hopTtl:
          $ref: "#/components/schemas/HopTtl"
    GroupMessage:
      type: object
      required: [id, fromUuid, fromNickname, body, sentAt]
      properties:
        id:
          type: string
          format: uuid
        fromUuid:
          type: string
          format: uuid
        fromNickname:
          type: string
        body:
          type: string
        sentAt:
          type: integer
          format: int64
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
        toUuid:
          $ref: "#/components/schemas/ToUuid"
        via:
          $ref: "#/components/schemas/Via"
        hopTtl:
          $ref: "#/components/schemas/HopTtl"
    GroupMessagePost:
      type: object
      required: [snapshot, message]
      properties:
        snapshot:
          $ref: "#/components/schemas/GroupSnapshot"
        message:
          $ref: "#/components/schemas/GroupMessage"
    GroupSyncCursor:
      type: object
      required: [groupId, latestSentAt]
      properties:
        groupId:
          type: string
          format: uuid
        latestSentAt:
          type: integer
          format: int64
    GroupSyncRequest:
      type: object
      required: [fromUuid, cursors]
      properties:
        fromUuid:
          type: string
          format: uuid
        cursors:
          type: array
          items:
            $ref: "#/components/schemas/GroupSyncCursor"
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
        toUuid:
          $ref: "#/components/schemas/ToUuid"
        via:
          $ref: "#/components/schemas/Via"
        hopTtl:
          $ref: "#/components/schemas/HopTtl"
    GroupSyncPayload:
      type: object
      required: [snapshot, messages]
      properties:
        snapshot:
          $ref: "#/components/schemas/GroupSnapshot"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/GroupMessage"
        reactions:
          type: array
          description: |
            Catch-up reactions for messages in [messages]. Each entry has
            `groupId` set to the enclosing group's id. Receivers upsert
            keyed on `(messageId, fromUuid)`; `emoji == null` removes.
            Omitted by peers that predate group reactions.
          items:
            $ref: "#/components/schemas/Reaction"
    GroupSyncResponse:
      type: object
      required: [payloads]
      properties:
        payloads:
          type: array
          items:
            $ref: "#/components/schemas/GroupSyncPayload"
    GroupLeave:
      type: object
      required: [groupId, fromUuid]
      properties:
        groupId:
          type: string
          format: uuid
        fromUuid:
          type: string
          format: uuid
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
        toUuid:
          $ref: "#/components/schemas/ToUuid"
        via:
          $ref: "#/components/schemas/Via"
        hopTtl:
          $ref: "#/components/schemas/HopTtl"
    GossipedPeer:
      type: object
      required: [uuid, nickname, publicKey]
      description: |
        Phase 4 multi-network bridging — projection of one of the
        responder's currently-discovered peers, returned in
        `Info.peers`. Excludes host/port (unreachable from the
        requester's perspective). The public key lets the requester
        verify signed DTOs that later arrive via a bridge claiming
        to come from this peer.
      properties:
        uuid:
          type: string
          format: uuid
        nickname:
          type: string
          minLength: 1
          maxLength: 32
        publicKey:
          type: string
          description: Base64-encoded raw Ed25519 public key (32 bytes → 44 b64 chars).
        avatarHash:
          type: string
          nullable: true
          description: |
            Phase 4 multi-network bridging — SHA-256 hex of the gossiped
            peer's avatar JPEG as last seen by this responder. `null`
            when the peer has no custom avatar set or when the responder
            hasn't cached the bytes. Receivers compare to their own
            cached hash and, on mismatch, pull the bytes through this
            responder via `GET /v1/peer-avatar/{uuid}`.
    ToUuid:
      type: string
      format: uuid
      nullable: true
      description: |
        Phase 4 multi-network bridging — final intended recipient when
        the request is being relayed through one or more intermediates.
        When set on a request the immediate receiver gets, the receiver
        either forwards (`toUuid != self.uuid`) or consumes locally
        (`toUuid == self.uuid` or `toUuid == null`). Included in the
        DTO's signature so intermediates cannot redirect.
    Via:
      type: array
      nullable: true
      description: |
        Phase 4 multi-network bridging — UUIDs of intermediate peers
        that have relayed this DTO. Each forwarding hop appends its own
        UUID. Receivers reject if their own UUID is already in `via`
        (loop detection). **Not** part of the signature — intermediates
        mutate it.
      items:
        type: string
        format: uuid
    HopTtl:
      type: integer
      format: int32
      nullable: true
      minimum: 0
      description: |
        Phase 4 multi-network bridging — remaining hops the DTO may
        take. Each forwarding intermediate decrements by one; a 0
        value at a forwarder causes 400 `relay_unroutable`. Originators
        leaving this null get a default of 3 (covers one bridge hop
        plus safety). **Not** part of the signature.
    SignedAt:
      type: integer
      format: int64
      nullable: true
      minimum: 0
      description: |
        Phase 2b multi-network bridging — Unix epoch milliseconds when the
        sender produced the [signature]. Receivers reject signatures whose
        `signedAt` is more than ±5 minutes from local time as a replay-
        protection measure. `null` during the phase 2b rollout window for
        peers running pre-2b builds; rejected once the rollout completes.
    Signature:
      type: string
      nullable: true
      description: |
        Phase 2b multi-network bridging — base64-encoded raw Ed25519
        signature (64 bytes → 88 b64 chars) over a canonical byte payload
        derived from the DTO's fields plus [signedAt]. The exact byte
        layout is defined per-DTO in `commonMain/.../crypto/SignaturePayload.kt`
        — see the `SignatureDomain` constants. The signing key is the
        sender's per-install Ed25519 key, advertised in the `pk` mDNS TXT
        attribute and `GET /v1/info.publicKey`. `null` during phase 2b
        rollout for peers that haven't upgraded; receivers tolerate but
        log a WARN. A future release flips to reject-on-absent.
    CallOffer:
      type: object
      required: [callId, fromUuid, fromNickname, sdp, sentAt]
      properties:
        callId:
          type: string
          format: uuid
          description: |
            Sender-generated identifier for this call. Both sides reference
            it for every subsequent signaling message (`answer`, `ice`,
            `hangup`).
        fromUuid:
          type: string
          format: uuid
        fromNickname:
          type: string
        sdp:
          type: string
          description: SDP offer text as produced by `RTCPeerConnection.createOffer`.
        sentAt:
          type: integer
          format: int64
          description: Unix epoch milliseconds when the caller initiated the call.
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
        toUuid:
          $ref: "#/components/schemas/ToUuid"
        via:
          $ref: "#/components/schemas/Via"
        hopTtl:
          $ref: "#/components/schemas/HopTtl"
    CallAnswer:
      type: object
      required: [callId, fromUuid, sdp]
      properties:
        callId:
          type: string
          format: uuid
        fromUuid:
          type: string
          format: uuid
        sdp:
          type: string
          description: SDP answer text as produced by `RTCPeerConnection.createAnswer`.
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
        toUuid:
          $ref: "#/components/schemas/ToUuid"
        via:
          $ref: "#/components/schemas/Via"
        hopTtl:
          $ref: "#/components/schemas/HopTtl"
    CallIce:
      type: object
      required: [callId, fromUuid, candidate]
      properties:
        callId:
          type: string
          format: uuid
        fromUuid:
          type: string
          format: uuid
        candidate:
          type: string
          description: Raw ICE candidate line (e.g. `candidate:0 1 UDP 2122252543 192.168.1.5 9000 typ host`).
        sdpMid:
          type: string
          nullable: true
          description: Media stream identification tag this candidate belongs to (e.g. `audio`).
        sdpMLineIndex:
          type: integer
          default: 0
          description: Zero-based index of the m-section this candidate belongs to.
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
        toUuid:
          $ref: "#/components/schemas/ToUuid"
        via:
          $ref: "#/components/schemas/Via"
        hopTtl:
          $ref: "#/components/schemas/HopTtl"
    CallHangup:
      type: object
      required: [callId, fromUuid]
      properties:
        callId:
          type: string
          format: uuid
        fromUuid:
          type: string
          format: uuid
        reason:
          type: string
          nullable: true
          enum: [HANGUP, BUSY, NO_ANSWER, FAILED]
          description: |
            Why the call ended. Informational only — the receiver maps it
            into the local `calls` table for the history UI. `HANGUP` (the
            default if omitted) covers normal user-initiated termination
            at any phase. `BUSY` is the auto-hangup the receiver issues
            when an incoming offer arrives during another active call.
            `NO_ANSWER` is the caller-side ring timeout. `FAILED` is set
            on local connection-layer errors.
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
        toUuid:
          $ref: "#/components/schemas/ToUuid"
        via:
          $ref: "#/components/schemas/Via"
        hopTtl:
          $ref: "#/components/schemas/HopTtl"
    RelayCredRequest:
      type: object
      required: [fromUuid, requestedAt]
      description: |
        Phase 3 multi-network bridging — request body for
        `POST /v1/call/relay-cred`. Signed so the bridge can verify the
        requester's identity (the response binds the requester's UUID
        into the TURN username, preventing credential reuse by other peers).
      properties:
        fromUuid:
          type: string
          format: uuid
          description: Requester's stable identity.
        requestedAt:
          type: integer
          format: int64
          description: Unix epoch milliseconds when the request was built.
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
    RelayCredResponse:
      type: object
      required: [fromUuid, uris, username, credential, expiresAt]
      description: |
        Phase 3 — TURN credentials issued by a relay-enabled bridge. The
        response is signed by the bridge so the requester can verify the
        credentials weren't forged by a LAN MitM. `uris` lists one entry
        per externally-routable interface the bridge is bound to; the
        requester adds them all to `RTCConfiguration.iceServers` and
        libwebrtc picks whichever pair wins.
      properties:
        fromUuid:
          type: string
          format: uuid
          description: Bridge's UUID — verified against TOFU-pinned pubkey for the response signature.
        uris:
          type: array
          items:
            type: string
          description: |
            TURN URIs, one per externally-routable interface. Format:
            `turn:<ip>:<port>?transport=udp`. Phase 3 supports UDP only.
        username:
          type: string
          description: |
            TURN long-term credential username. Encodes the credential
            expiry epoch and the requesting peer's UUID (RFC 8155 /
            TURN-REST-API style) so the TURN server can verify
            statelessly. Pass directly into `RTCIceServer.username`.
        credential:
          type: string
          description: |
            Base64(HMAC-SHA1(per-process secret, username)). Pass directly
            into `RTCIceServer.credential` / `IceServer.password`.
        expiresAt:
          type: integer
          format: int64
          description: |
            Unix epoch milliseconds at which these credentials stop being
            accepted by the TURN server. Approximately `requestedAt + 5 min`.
        signedAt:
          $ref: "#/components/schemas/SignedAt"
        signature:
          $ref: "#/components/schemas/Signature"
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          minLength: 1
          enum:
            - bad_request
            - unknown_peer
            - address_mismatch
            - internal_error
            - signature_invalid
            - signature_replay
            - relay_refused
            - relay_unroutable
            - relay_denied
            - relay_unavailable
          description: |
            Machine-readable error identifier. Clients may switch on this
            value to render appropriate UI; it will never contain whitespace.
        detail:
          type: string
          nullable: true
          description: |
            Optional free-form context — typically the underlying exception
            message from the receiving peer. Useful for logs; not intended
            to drive client logic.
  responses:
    Error:
      description: An error response. The HTTP status code carries the kind.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            unknown_peer:
              summary: 404 — peer not seen via NSD
              value:
                error: unknown_peer
            address_mismatch:
              summary: 401 — source IP doesn't match advertised host
              value:
                error: address_mismatch
